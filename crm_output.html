<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUBMOVIL - Iniciar Sesión</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="/static/css/style.css">
    
</head>

<body class="login-page">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="bi bi-droplet-fill text-primary me-2"></i>
                LUBMOVIL<span class="text-primary">.</span>
            </a>

            
        </div>
    </nav>

    <div class="">
        
<div class="login-container mx-auto">
    <div class="card glass border-0 shadow-lg">
        <div class="card-body p-5">
            <div class="text-center mb-5">
                <div class="bg-primary bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
                    <i class="bi bi-person-lock fs-1 text-primary"></i>
                </div>
                <h2 class="fw-bold text-dark">LUBMOVIL<span class="text-primary">.</span></h2>
                <p class="text-muted small">Panel de Control de Servicios</p>
            </div>

            <!-- Mensajes de Alerta -->
            <div id="alert-container"></div>

            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-muted">USUARIO</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i
                                class="bi bi-person text-muted"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" id="username" name="username"
                            required placeholder="admin">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold text-muted">CONTRASEÑA</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-key text-muted"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0" id="password" name="password"
                            required placeholder="••••••••">
                    </div>
                </div>
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary btn-lg shadow-sm py-3 h-auto">
                        <span id="spinner" class="spinner-border spinner-border-sm d-none me-2" role="status"></span>
                        Ingresar al Sistema
                    </button>
                </div>
                <div class="text-center">
                    <span class="text-muted x-small text-uppercase"
                        style="font-size: 0.7rem; letter-spacing: 1px;">Valles del Tuy, Venezuela</span>
                </div>
            </form>
        </div>
    </div>
</div>

    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertContainer = document.getElementById('alert-container');
        const spinner = document.getElementById('spinner');
        spinner.classList.remove('d-none');

        // Limpiar alertas previas
        alertContainer.innerHTML = '';

        const formData = new FormData(e.target);

        try {
            const response = await fetch('/auth/login', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (response.ok) {
                // Redirigir según el rol o al index
                window.location.href = '/';
            } else {
                alertContainer.innerHTML = `
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    ${result.detail || 'Error al iniciar sesión'}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            }
        } catch (error) {
            alertContainer.innerHTML = `
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-wifi-off me-2"></i>
                Error de conexión. Intente de nuevo.
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `;
        } finally {
            spinner.classList.add('d-none');
        }
    });
</script>

</body>

</html>

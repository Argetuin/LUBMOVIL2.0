<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ settings.PROJECT_NAME }} - {% block title %}{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        [x-cloak] {
            display: none !important;
        }
    </style>
    {% block head %}{% endblock %}
</head>

<body class="{% block body_class %}{% endblock %}">
    {% if not hide_nav %}
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="bi bi-droplet-fill text-primary me-2"></i>
                LUBMOVIL<span class="text-primary">.</span>
            </a>

            {% if user %}
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-speedometer2 me-1"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/inventory"><i class="bi bi-box-seam me-1"></i> Inventario</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/crm"><i class="bi bi-people me-1"></i> CRM</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/cerebro"><i class="bi bi-briefcase me-1"></i> Operaciones</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="text-light me-3 d-none d-lg-block small">Hola, <b>{{ user.full_name }}</b></span>
                    <a href="/auth/logout" class="btn btn-outline-light btn-sm rounded-pill px-3">Salir</a>
                </div>
            </div>
            {% endif %}
        </div>
    </nav>
    {% endif %}

    <div class="{% block container_class %}container mt-4{% endblock %}">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
